<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ALYF Kokan Trip 2026 — Meal Preferences</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --navy:#1B3F6B;--blue:#2E75B6;--light-blue:#E6F1FB;
    --veg-green:#375623;--veg-bg:#E2EFDA;
    --nv-orange:#843C0C;--nv-bg:#FCE4D6;
    --border:#D0DCE8;--alt:#F7FAFD;
    --text:#1a1a1a;--muted:#666;
    --radius:12px;--radius-sm:8px;
    --saffron:#E87722;--saffron-light:#FEF0E6;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
    background:#F0F4F8;min-height:100vh;color:var(--text);font-size:15px}
  .shell{max-width:560px;margin:0 auto;padding:16px 12px 60px}

  /* ── Splash ── */
  .splash{position:relative;border-radius:var(--radius);overflow:hidden;margin-bottom:14px;min-height:320px;display:flex;flex-direction:column;justify-content:flex-end}
  .splash-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
  .splash-overlay{position:absolute;inset:0;background:linear-gradient(to bottom, rgba(0,0,0,0.08) 0%, rgba(10,30,60,0.75) 55%, rgba(10,20,50,0.92) 100%)}
  .splash-content{position:relative;z-index:2;padding:24px 20px 22px;color:#fff;text-align:center}
  .splash-org{font-size:11px;font-weight:700;letter-spacing:1.5px;opacity:.85;text-transform:uppercase;margin-bottom:6px}
  .splash-title{font-size:26px;font-weight:800;line-height:1.2;margin-bottom:4px}
  .splash-subtitle{font-size:13px;opacity:.8;margin-bottom:16px}
  .splash-pills{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-bottom:20px}
  .splash-pill{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);border-radius:99px;padding:4px 12px;font-size:12px;backdrop-filter:blur(4px)}
  .splash-pill.gold{background:rgba(232,119,34,.7);border-color:rgba(232,119,34,.5)}
  .btn-splash{width:100%;padding:14px;border:none;border-radius:var(--radius-sm);background:var(--saffron);color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:opacity .15s;letter-spacing:.3px}
  .btn-splash:hover{opacity:.88}
  .alyf-logo-wrap{margin-bottom:14px;text-align:center}
  .alyf-emblem{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.4);display:inline-flex;align-items:center;justify-content:center;font-size:26px;backdrop-filter:blur(4px)}

  /* ── Input validation states ── */
  input.valid{border-color:#3A8A3A !important}
  input.invalid{border-color:#C0392B !important}
  .field-msg{font-size:11px;margin-top:4px;min-height:14px}
  .field-msg.ok{color:#3A8A3A}
  .field-msg.err{color:#C0392B}

  /* ── Progress ── */
  .prog-wrap{margin-bottom:20px}
  .prog-bar{height:5px;background:#dde4ed;border-radius:99px;overflow:hidden}
  .prog-fill{height:5px;background:var(--blue);border-radius:99px;transition:width .35s ease}
  .prog-label{font-size:12px;color:var(--muted);margin-top:5px;display:flex;justify-content:space-between}

  /* ── Card ── */
  .card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px}

  /* ── Step header ── */
  .step-icon{font-size:36px;text-align:center;margin-bottom:8px}
  .step-title{font-size:20px;font-weight:600;text-align:center;margin-bottom:6px}
  .step-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:22px}

  /* ── Inputs ── */
  input[type=text],input[type=tel]{width:100%;padding:12px 14px;border:1.5px solid var(--border);
    border-radius:var(--radius-sm);font-size:15px;outline:none;transition:border .2s;font-family:inherit}
  input[type=text]:focus,input[type=tel]:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,117,182,.12)}

  /* ── Option cards ── */
  .opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
  .opt-card{padding:16px 12px;border:1.5px solid var(--border);border-radius:var(--radius);
    text-align:center;cursor:pointer;transition:all .15s;background:#fff;user-select:none}
  .opt-card:hover{border-color:var(--blue);background:var(--light-blue)}
  .opt-card.sel{border-color:var(--blue);background:var(--light-blue)}
  .opt-card.sel .opt-label{color:var(--blue)}
  .opt-icon{font-size:26px;margin-bottom:6px}
  .opt-label{font-size:14px;font-weight:600}
  .opt-desc{font-size:11px;color:var(--muted);margin-top:3px}

  /* ── Meal items ── */
  .section-head{font-size:11px;font-weight:700;color:var(--muted);
    text-transform:uppercase;letter-spacing:.8px;padding:10px 0 6px;
    border-bottom:1px solid var(--border);margin-bottom:8px}
  .item-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
  .item-btn{padding:9px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);
    background:#fff;text-align:left;cursor:pointer;display:flex;
    justify-content:space-between;align-items:center;gap:6px;transition:all .12s}
  .item-btn:hover{border-color:var(--blue);background:var(--light-blue)}
  .item-btn.sel{border-color:var(--blue);background:var(--light-blue)}
  .item-btn.thali{border-color:#C9A227;background:#FFFBEF}
  .item-btn.thali:hover{border-color:#A07818;background:#FFF3CC}
  .item-btn.thali.sel{border-color:#A07818;background:#FFF3CC}
  .item-btn.thali .item-name{color:#7A5C00;font-weight:600}
  .item-btn.thali .item-price{color:#A07818}
  .item-btn.thali .chk{border-color:#C9A227}
  .item-btn.thali.sel .chk{background:#C9A227;border-color:#C9A227}
  .item-btn.thali.sel .item-name{color:#5A4200}
  .thali-badge{display:inline-block;font-size:9px;font-weight:700;
    background:#C9A227;color:#fff;border-radius:4px;padding:1px 5px;
    margin-left:5px;vertical-align:middle;letter-spacing:.4px}
  .section-head.thali-head{color:#7A5C00;border-bottom-color:#C9A227}
  .item-name{font-size:12px;line-height:1.3;color:var(--text)}
  .item-btn.sel .item-name{color:var(--blue);font-weight:600}
  .item-btn.thali.sel .item-name{color:#5A4200}
  .item-price{font-size:11px;color:var(--muted);white-space:nowrap}
  .item-btn.sel .item-price{color:var(--blue)}
  .chk{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--border);
    flex-shrink:0;display:flex;align-items:center;justify-content:center;
    font-size:10px;color:#fff;background:#fff;transition:all .12s}
  .item-btn.sel .chk{background:var(--blue);border-color:var(--blue)}
  .sel-badge{display:inline-block;background:var(--light-blue);color:var(--blue);
    border-radius:99px;padding:3px 10px;font-size:12px;font-weight:600;margin-left:8px}

  /* ── Review ── */
  .review-meal{margin-bottom:14px}
  .review-meal-title{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px}
  .tag{display:inline-block;background:#F0F4F8;border:1px solid var(--border);
    border-radius:99px;padding:3px 10px;font-size:12px;margin:2px 2px 2px 0}

  /* ── Buttons ── */
  .btn-row{display:flex;gap:10px;margin-top:16px}
  .btn-primary{flex:1;padding:13px;border:none;border-radius:var(--radius-sm);
    background:var(--blue);color:#fff;font-size:15px;font-weight:600;
    cursor:pointer;transition:background .15s}
  .btn-primary:hover{background:var(--navy)}
  .btn-primary:disabled{opacity:.45;cursor:not-allowed}
  .btn-skip{padding:13px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);
    background:#fff;color:var(--muted);font-size:14px;cursor:pointer;transition:all .15s}
  .btn-skip:hover{border-color:var(--blue);color:var(--blue)}
  .btn-back{padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);
    background:#fff;color:var(--muted);font-size:13px;cursor:pointer}

  /* ── Banners ── */
  .hero{background:var(--navy);color:#fff;border-radius:var(--radius);
    padding:28px 20px 22px;text-align:center;margin-bottom:14px}
  .hero h1{font-size:22px;font-weight:700;margin-bottom:6px}
  .hero p{font-size:13px;opacity:.8;margin-bottom:14px}
  .hero-pills{display:flex;flex-wrap:wrap;justify-content:center;gap:6px}
  .hero-pill{background:rgba(255,255,255,.15);border-radius:99px;
    padding:4px 12px;font-size:12px}

  .btn-start{width:100%;padding:14px;border:none;border-radius:var(--radius-sm);
    background:#fff;color:var(--navy);font-size:16px;font-weight:700;
    cursor:pointer;margin-top:18px;transition:opacity .15s}
  .btn-start:hover{opacity:.88}

  /* ── Nav bar ── */
  .nav{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .nav-title{font-size:14px;font-weight:600;flex:1;color:var(--navy)}

  /* ── Done screen ── */
  .done{text-align:center;padding:40px 20px}
  .done-icon{font-size:56px;margin-bottom:14px}
  .done h2{font-size:22px;font-weight:700;margin-bottom:8px}
  .done p{color:var(--muted);font-size:14px;margin-bottom:24px}

  /* ── Config notice ── */
  .config-notice{background:#FFF9C4;border:1px solid #F0D050;border-radius:var(--radius-sm);
    padding:12px 14px;font-size:13px;color:#555;margin-bottom:14px;display:none}
  .config-notice.show{display:block}

  /* ── Spinner ── */
  .spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.4);
    border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:400px){
    .item-grid{grid-template-columns:1fr}
    .opt-grid{grid-template-columns:1fr 1fr}
  }
</style>
</head>

// ─── State ───────────────────────────────────────────────────────────────────
let state = {
  screen: "splash",  // splash | home | form | done | error
  step: 1,
  form: {name:"", mobile:"", emergencyContact:"", dietary:"", drinks:[], d1_dinner:[], d2_breakfast:[], d2_lunch:[], d2_dinner:[], d3_breakfast:[]},
  saving: false,
};
const TOTAL = 9;

// ─── Helpers ─────────────────────────────────────────────────────────────────
function groupBy(arr, key) {
  const g = {};
  arr.forEach(i => { const k = i[key]||"Other"; (g[k]=g[k]||[]).push(i); });
  return g;
}
function canNext() {
  const {step, form} = state;
  if (step===1) return form.name.trim().length >= 2 && /^[0-9]{10}$/.test(form.mobile.trim());
  if (step===2) return !!form.dietary;
  if (step===3) return form.drinks.length > 0;
  return true;
}
function mealItems(mealKey) {
  const m = MEALS[mealKey - 4];
  return state.form.dietary === "Non-Veg" ? m.nv : m.veg;
}
function toggleItem(key, name) {
  const cur = state.form[key];
  state.form[key] = cur.includes(name) ? cur.filter(x=>x!==name) : [...cur, name];
  render();
}
function toggleDrink(id) {
  const cur = state.form.drinks;
  let upd;
  if (id==="none") { upd = (cur.includes("none") && cur.length===1) ? [] : ["none"]; }
  else { const no = cur.filter(d=>d!=="none"); upd = no.includes(id) ? no.filter(x=>x!==id) : [...no, id]; }
  state.form.drinks = upd;
  render();
}

// ─── Submit ───────────────────────────────────────────────────────────────────
async function submit() {
  if (SCRIPT_URL === "YOUR_APPS_SCRIPT_URL_HERE") {
    alert("⚠️  Please paste your Google Apps Script URL into the SCRIPT_URL variable in the HTML file.");
    return;
  }
  state.saving = true; render();
  const payload = {
    ...state.form,
    drinks: state.form.drinks.join(", "),
    d1_dinner:    state.form.d1_dinner.join(", "),
    d2_breakfast: state.form.d2_breakfast.join(", "),
    d2_lunch:     state.form.d2_lunch.join(", "),
    d2_dinner:    state.form.d2_dinner.join(", "),
    d3_breakfast: state.form.d3_breakfast.join(", "),
    submittedAt:  new Date().toLocaleString("en-IN"),
  };
  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(payload),
    });
    state.screen = "done"; state.saving = false; render();
  } catch(e) {
    state.saving = false;
    state.screen = "error"; render();
  }
}

// ─── Renderers ───────────────────────────────────────────────────────────────
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k==="class") e.className=v;
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k==="disabled") e.disabled=!!v;
    else e.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c==null) return;
    e.appendChild(typeof c==="string" ? document.createTextNode(c) : c);
  });
  return e;
}

    el("div",{class:"step-sub"},`Preferences for ${state.form.name}`),
    el("div",{style:"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px"},
      el("span",{style:`padding:4px 12px;border-radius:99px;font-size:13px;font-weight:600;background:${state.form.dietary==="Veg"?"var(--veg-bg)":"var(--nv-bg)"};color:${state.form.dietary==="Veg"?"var(--veg-green)":"var(--nv-orange)"}`},
        (state.form.dietary==="Veg"?"🌿 ":"🍖 ")+state.form.dietary
      ),
      el("span",{style:"padding:4px 12px;border-radius:99px;font-size:13px;background:var(--light-blue);color:var(--blue)"},
        "🥂 " + (drinkLabels.join(", ")||"—")
      )
    ),
    el("div",{style:"background:var(--alt);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:16px;font-size:13px"},
      el("div",{style:"display:flex;gap:8px;margin-bottom:6px"},
        el("span",{style:"color:var(--muted);min-width:80px"},"📱 Mobile"),
        el("span",{style:"font-weight:600"},state.form.mobile||"—")
      ),
      el("div",{style:"display:flex;gap:8px"},
        el("span",{style:"color:var(--muted);min-width:80px"},"🆘 Emergency"),
        el("span",{},(state.form.emergencyContact ? "+91 "+state.form.emergencyContact : "Not provided"))
      )
    ),
    ...MEALS.map(m => {
      const picks = state.form[m.key];
      return el("div",{class:"review-meal"},
        el("div",{class:"review-meal-title"},`${m.emoji} ${m.label}`),
        picks.length
          ? el("div",{}, ...picks.map(p => el("span",{class:"tag"},p)))
          : el("span",{style:"font-size:12px;color:var(--muted)"},"Nothing selected")
      );
    })
  );
}

function renderForm() {
  const frag = document.createDocumentFragment();
  frag.appendChild(renderNav());
  const s = state.step;
  if (s===1) frag.appendChild(renderStep1());
  else if (s===2) frag.appendChild(renderStep2());
  else if (s===3) frag.appendChild(renderStep3());
  else if (s>=4 && s<=8) frag.appendChild(renderMealStep(s));
  else if (s===9) frag.appendChild(renderReview());

  // Bottom row
  const row = el("div",{class:"btn-row"});
  if (s >= 4 && s <= 8) {
    row.appendChild(el("button",{class:"btn-skip", onclick:()=>{state.step++;render();}}, "Skip →"));
  }
  if (s < 9) {
    const nxt = el("button",{class:"btn-primary", disabled:!canNext(), onclick:()=>{state.step++;render();}},
      s===8 ? "Review →" : "Next →");
    row.appendChild(nxt);
  } else {
    const sub = el("button",{class:"btn-primary", disabled:state.saving,
      onclick: submit},
      state.saving ? el("span",{},[el("span",{class:"spinner"}),"Saving..."]) : "Submit preferences ✓"
    );
    row.appendChild(sub);
  }
  frag.appendChild(row);
  return frag;
}

function renderDone() {
  return el("div",{class:"done"},
    el("div",{class:"done-icon"},"🎉"),
    el("h2",{},`Thanks, ${state.form.name}!`),
    el("p",{},"Your meal preferences have been saved. See you on 20th March!"),
    el("button",{class:"btn-primary",style:"max-width:260px;margin:0 auto",
      onclick:()=>{
        state={screen:"splash",step:1,form:{name:"",mobile:"",emergencyContact:"",dietary:"",drinks:[],d1_dinner:[],d2_breakfast:[],d2_lunch:[],d2_dinner:[],d3_breakfast:[]},saving:false};
        render();
      }}, "Add another person")
  );
}

function renderError() {
  return el("div",{class:"done"},
    el("div",{class:"done-icon"},"😕"),
    el("h2",{},"Something went wrong"),
    el("p",{},"Couldn't connect to the server. Please check your internet and try again."),
    el("button",{class:"btn-primary",style:"max-width:260px;margin:0 auto",
      onclick:()=>{state.screen="form";state.step=9;state.saving=false;render();}}, "Try again")
  );
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  if (state.screen==="splash") app.appendChild(renderSplash());
  else if (state.screen==="home") app.appendChild(renderHome());
  else if (state.screen==="form") app.appendChild(renderForm());
  else if (state.screen==="done") app.appendChild(renderDone());
  else if (state.screen==="error") app.appendChild(renderError());
  // Restore input value after re-render
  if (state.screen==="form" && state.step===1) {
    setTimeout(()=>{ const i=app.querySelector("input"); if(i){i.value=state.form.name; i.focus();} }, 0);
  }
}

render();
</script>
</body>
</html>
